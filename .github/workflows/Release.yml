name: Build and Release Smart Gallary

on:
  push:
    tags:
      - 'v*' # Triggers automatically when you push a tag (e.g., v1.0)
  workflow_dispatch: # Allows manual triggering

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial permission required to publish the release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Build Release APK
        # The '-x lint' flag bypasses minor code warnings that often crash GitHub builds
        run: ./gradlew assembleRelease -x lint

      - name: Collect APKs (Failsafe)
        # Searches the entire workspace for APKs and moves them to a single 'final-apks' folder
        run: |
          mkdir -p final-apks
          find . -name "*.apk" -type f -exec cp {} final-apks/ \;
          echo "Collected the following APKs for release:"
          ls -la final-apks/

      - name: Get Tag Name (If triggered by tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "VERSION_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Set Default Tag Name (If triggered manually)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: echo "VERSION_TAG=manual-${{ github.run_number }}" >> $GITHUB_ENV

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: Smart Gallary ${{ env.VERSION_TAG }}
          tag_name: ${{ env.VERSION_TAG }}
          files: final-apks/*.apk
          generate_release_notes: true
          
